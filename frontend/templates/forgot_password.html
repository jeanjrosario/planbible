{% extends "base.html" %}
{% block title %}Esqueci minha senha — Leitura Bíblica{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">📖 <span>Leitura Bíblica 2026</span></div>
    <h1 class="auth-title">Recuperar senha</h1>
    <p class="auth-sub">Digite seu email para receber as instruções</p>

    <div class="alert alert-error" id="alert-error"></div>
    <div class="alert alert-success" id="alert-success"></div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    </div>

    <button class="btn btn-primary" id="btn-send" onclick="doSend()">Enviar instruções</button>

    <div class="auth-footer"><a href="/" style="color:var(--text-dim);">← Voltar ao login</a></div>
  </div>
</div>

<script>
async function doSend() {
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('btn-send');
  const err = document.getElementById('alert-error');
  const ok = document.getElementById('alert-success');
  err.classList.remove('show'); ok.classList.remove('show');

  if (!email) { err.textContent = 'Digite seu email'; err.classList.add('show'); return; }

  btn.disabled = true; btn.textContent = 'Enviando...';
  try {
    const res = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const data = await res.json();
    ok.textContent = data.message;
    ok.classList.add('show');
  } catch (e) {
    err.textContent = 'Erro de conexão.'; err.classList.add('show');
  } finally {
    btn.disabled = false; btn.textContent = 'Enviar instruções';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doSend(); });
</script>
{% endblock %}
