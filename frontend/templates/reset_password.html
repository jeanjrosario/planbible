{% extends "base.html" %}
{% block title %}Nova senha — Leitura Bíblica{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">📖 <span>Leitura Bíblica 2026</span></div>
    <h1 class="auth-title">Nova senha</h1>
    <p class="auth-sub">Escolha uma nova senha para sua conta</p>

    <div class="alert alert-error" id="alert-error"></div>
    <div class="alert alert-success" id="alert-success"></div>

    <div class="form-group">
      <label class="form-label">Nova senha <span style="color:var(--text-dim);font-weight:400;">(mín. 6 caracteres)</span></label>
      <input class="form-input" type="password" id="password" placeholder="••••••••">
    </div>
    <div class="form-group">
      <label class="form-label">Confirmar senha</label>
      <input class="form-input" type="password" id="confirm" placeholder="••••••••">
    </div>

    <button class="btn btn-primary" id="btn-reset" onclick="doReset()">Redefinir senha</button>
  </div>
</div>

<script>
const TOKEN = "{{ token }}";

async function doReset() {
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const btn = document.getElementById('btn-reset');
  const err = document.getElementById('alert-error');
  const ok = document.getElementById('alert-success');
  err.classList.remove('show'); ok.classList.remove('show');

  if (!password || !confirm) { err.textContent = 'Preencha todos os campos'; err.classList.add('show'); return; }
  if (password !== confirm) { err.textContent = 'As senhas não coincidem'; err.classList.add('show'); return; }

  btn.disabled = true; btn.textContent = 'Salvando...';
  try {
    const res = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: TOKEN, password }),
    });
    const data = await res.json();
    if (!res.ok) {
      err.textContent = data.detail || 'Erro ao redefinir senha';
      err.classList.add('show');
    } else {
      ok.textContent = 'Senha redefinida! Redirecionando...';
      ok.classList.add('show');
      setTimeout(() => window.location.href = '/', 1800);
    }
  } catch (e) {
    err.textContent = 'Erro de conexão.'; err.classList.add('show');
  } finally {
    btn.disabled = false; btn.textContent = 'Redefinir senha';
  }
}
</script>
{% endblock %}
